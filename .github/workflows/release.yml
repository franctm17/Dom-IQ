name: Auto-release on tag push

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get previous tag
        id: prev
        run: |
          PREV=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || echo "")
          echo "tag=$PREV" >> $GITHUB_OUTPUT

      - name: Build changelog
        id: changelog
        run: |
          if [ -n "${{ steps.prev.outputs.tag }}" ]; then
            LOG=$(git log --pretty=format:'- %s' "${{ steps.prev.outputs.tag }}..${GITHUB_REF_NAME}")
          else
            LOG=$(git log --pretty=format:'- %s' "${GITHUB_REF_NAME}")
          fi
          {
            echo "body<<EOF"
            echo "## Changes"
            echo ""
            echo "$LOG"
            echo ""
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          files: |
            domiq.js
            revoked.json
          draft: false
          prerelease: false
